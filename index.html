<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Archive</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0F1117;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overflow:hidden;
}

.container{
    position:relative;
    width:100vw;
    height:100vh;
}

.header{
    text-align:center;
    padding-top:40px;
    position:relative;
    z-index:10;
}

h1{
    font-size:3rem;
    font-weight:300;
    letter-spacing:4px;
}

.subtitle{
    margin-top:20px;
    color:#cfcfcf;
    font-size:0.95rem;
    line-height:1.7;
}

.categories{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    font-size:0.9rem;
}

.strength{color:#4A6FA5;}
.weakness{color:#B05A5A;}
.experience{color:#D9A441;}
.value{color:#6FA37A;}
.emotion{color:#8C6BB1;}
.undefined{color:#B8B8B8;}

.field{
    margin-top:20px;
}

select,input,button{
    border:none;
    padding:12px;
    border-radius:8px;
}

input{
    width:300px;
}

button{
    cursor:pointer;
}

.canvas{
    position:absolute;
    inset:0;
}

.bubble{
    position:absolute;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:10px;
    color:white;
    backdrop-filter:blur(6px);
    font-size:12px;
    overflow:hidden;
    animation:float 18s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-25px);}
    100%{transform:translateY(0px);}
}

.footer{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    z-index:10;
}

.count{
    margin-bottom:15px;
    color:#d0d0d0;
}

.message{
    color:#f1f1f1;
    line-height:1.8;
    font-size:0.95rem;
}

.signature{
    margin-top:18px;
    color:#7f7f7f;
    font-size:0.8rem;
}
.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:12px 20px;
    border-radius:12px;
    opacity:0;
    transition:0.4s;
    z-index:999;
}

.toast.show{
    opacity:1;
}

    .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    width:90%;
    max-width:500px;
    background:#161A22;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

.modal-category{
    font-size:0.9rem;
    opacity:0.7;
    margin-bottom:15px;
}

.modal-text{
    line-height:1.8;
    font-size:1rem;
    word-break:keep-all;
}
</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Human Archive</h1>

<div class="subtitle">
당신을 표현할 수 있는 단어 혹은 문장을 적어주세요.<br>
예) 장점, 단점부터 개인적 경험, 가치관까지 모두 좋습니다.
</div>

<div class="categories">
<span class="strength">장점</span>
<span class="weakness">단점</span>
<span class="experience">경험</span>
<span class="value">가치관</span>
<span class="emotion">감정</span>
<span class="undefined">정의하기 어려움</span>
</div>

<div class="field">
<select id="category">
<option value="strength">장점</option>
<option value="weakness">단점</option>
<option value="experience">경험</option>
<option value="value">가치관</option>
<option value="emotion">감정</option>
<option value="undefined">정의하기 어려움</option>
</select>

<input id="textInput" placeholder="당신을 표현하는 단어 혹은 문장을 남겨주세요">

<button onclick="createBubble()">등록</button>

</div>

</div>

<div id="canvas" class="canvas"></div>
<div id="toast" class="toast">
당신의 이야기가 아카이브에 기록되었습니다.
</div>
    
<div class="footer">

<div class="count">
현재 <span id="count">0</span>개의 이야기가 기록되었습니다.
</div>

<div class="message">
수백 명의 인간이 남긴 수백 개의 이야기.<br>
AI는 이 단어들을 학습할 수는 있다.<br>
하지만 AI는 '자신만의 이야기'를 가질 수 있을까?
</div>

<div class="signature">
Human Archive · jaeseungk
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAK0m0WvDP5FeE2BNBlXTSFwMRYynek3ds",
authDomain: "human-archive-7fc72.firebaseapp.com",
projectId: "human-archive-7fc72",
storageBucket: "human-archive-7fc72.firebasestorage.app",
messagingSenderId: "34294120671",
appId: "1:34294120671:web:dbc5dd1b8e4c63bcff296a",
measurementId: "G-TEYR05EMK9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const colors = {
strength:"#4A6FA5",
weakness:"#B05A5A",
experience:"#D9A441",
value:"#6FA37A",
emotion:"#8C6BB1",
undefined:"#B8B8B8"
};

const canvas = document.getElementById("canvas");
const countEl = document.getElementById("count");

let rendered = new Set();

window.createBubble = async function(){

const text=document.getElementById("textInput").value.trim();
const category=document.getElementById("category").value;

if(!text) return;

await addDoc(collection(db,"stories"),{
text,
category,
createdAt:Date.now()
});

document.getElementById("textInput").value="";
}
    
const toast = document.getElementById("toast");

toast.classList.add("show");

setTimeout(() => {
  toast.classList.remove("show");
}, 2000);
function drawBubble(id,data){

if(rendered.has(id)) return;

rendered.add(id);

const bubble=document.createElement("div");

bubble.className="bubble";

bubble.style.background=colors[data.category] || "#999";

bubble.style.width="100px";
bubble.style.height="100px";

bubble.style.left=Math.random()*85+"%";
bubble.style.top=(25+Math.random()*45)+"%";

bubble.textContent=
data.text.length>12
? data.text.slice(0,12)+"..."
: data.text;

bubble.title=data.text;

bubble.addEventListener("click",()=>{

document.getElementById("modal").style.display="flex";

document.getElementById("modalCategory").innerText =
data.category;

document.getElementById("modalText").innerText =
data.text;

});

canvas.appendChild(bubble);
}

onSnapshot(collection(db,"stories"),(snapshot)=>{

canvas.innerHTML="";
rendered.clear();

countEl.innerText=snapshot.size;

snapshot.forEach((doc)=>{
drawBubble(doc.id,doc.data());
});

});
    
document.getElementById("modal")
.addEventListener("click",()=>{

document.getElementById("modal").style.display="none";

});

</script>


<div id="modal" class="modal">

  <div class="modal-content">

    <div id="modalCategory" class="modal-category"></div>

    <div id="modalText" class="modal-text"></div>

  </div>

</div>

</body>
</html>
